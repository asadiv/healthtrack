on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: testing app
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: run pytest
        run: python3 -m pytest backend/test_app.py -v


  build-docker:
    name: build image and cont
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: build image
        run: docker build -t patient-api:${{ github.sha }} .
      
      - name: run container
        run: |
          docker run -d -p 5000:5000 --name patient-api1 patient-api:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:5000/api/health
          docker stop patient-api1
          docker rm patient-api1

